services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-storyboard}
      POSTGRES_USER: ${POSTGRES_USER:-storyboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storyboard-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - storyboard_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - storyboard_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: build
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    environment: &api_environment
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-storyboard}:${POSTGRES_PASSWORD:-storyboard-local}@postgres:5432/${POSTGRES_DB:-storyboard}?schema=public
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:-local-demo-session-secret-change-me}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:4000}
      API_PORT: 4000
      AUTH_DEV_BYPASS: "true"
      SEED_OPERATOR_EMAIL: ${SEED_OPERATOR_EMAIL:-dev@localhost}
      SEED_OPERATOR_NAME: ${SEED_OPERATOR_NAME:-Local Dev}
      OPENAI_ENABLED: "false"
      ENABLE_QUEUE_WORKER: "true"
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: build
    command: ["node", "prisma/seed.mjs"]
    environment: *api_environment
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment: *api_environment
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  storyboard_postgres:
  storyboard_redis:
