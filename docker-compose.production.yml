# Apply with: docker compose --env-file .env.production -f docker-compose.app.yml -f docker-compose.production.yml up --build
# This is an override template: provide public HTTPS URLs, Google OAuth settings,
# a strong session secret, and a non-default database password in .env.production.
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    # Database access stays on the private Compose network in this template.
    ports: !reset []
  redis:
    # Redis has no application-level password in the current bundle, so never
    # inherit the local demo's host-published port for a public deployment.
    ports: !reset []
  migrate:
    environment: &production_api_environment
      NODE_ENV: production
      AUTH_DEV_BYPASS: "false"
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      WEB_URL: ${WEB_URL:?WEB_URL is required}
      API_URL: ${API_URL:?API_URL is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}
      GOOGLE_OPERATOR_REDIRECT_URI: ${GOOGLE_OPERATOR_REDIRECT_URI:?GOOGLE_OPERATOR_REDIRECT_URI is required}
      # Optional for sign-in-only deployments; both are required before an
      # artist can connect Gmail, Calendar, or Drive from StoryBoard.
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      INTEGRATION_SECRETS_ENCRYPTION_KEY: ${INTEGRATION_SECRETS_ENCRYPTION_KEY:-}
  seed:
    environment: *production_api_environment
  api:
    environment: *production_api_environment
  web:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    environment:
      NODE_ENV: production
      AUTH_DEV_BYPASS: "false"
      API_URL: ${API_URL:?API_URL is required}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
