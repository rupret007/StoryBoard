name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: storyboard_test
          POSTGRES_USER: storyboard
          POSTGRES_PASSWORD: storyboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storyboard -d storyboard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
      - name: Enable Corepack and verify pnpm
        run: |
          corepack enable
          pnpm --version
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://storyboard:storyboard@localhost:5432/storyboard_test?schema=public
        run: pnpm db:generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Database integration tests
        env:
          STORYBOARD_TEST_DATABASE_URL: postgresql://storyboard:storyboard@localhost:5432/storyboard_test?schema=public
        run: pnpm test:integration
      - name: Production builds
        run: pnpm build
      - name: Install Chromium for browser tests
        run: pnpm --filter @storyboard/web exec playwright install --with-deps chromium
      - name: Browser booking workflow
        env:
          STORYBOARD_TEST_DATABASE_URL: postgresql://storyboard:storyboard@localhost:5432/storyboard_test?schema=public
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: browser-test-session-secret
        run: pnpm test:e2e
